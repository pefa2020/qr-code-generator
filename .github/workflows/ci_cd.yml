name: Build and Test Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t qr-code-generator-app .

      - name: Test Docker image runs successfully
        run: docker run --rm qr-code-generator-app --url https://github.com/pefa2020

      - name: Verify QR code generation with docker-compose
        run: |
          docker compose up --build --exit-code-from qr_code_app
